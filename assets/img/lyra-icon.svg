<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#4a6cf7"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  <!-- Lyre body: two curved arms -->
  <path d="M30 72 C24 60 24 40 32 26 C36 20 44 16 50 16 C56 16 64 20 68 26 C76 40 76 60 70 72"
        fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <!-- Lyre base crossbar -->
  <line x1="26" y1="72" x2="74" y2="72" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <!-- Lyre strings (5 vertical) -->
  <line x1="36" y1="30" x2="36" y2="72" stroke="#4fc3f7" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <line x1="43" y1="24" x2="43" y2="72" stroke="#4fc3f7" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <line x1="50" y1="22" x2="50" y2="72" stroke="#4fc3f7" stroke-width="2.5" opacity="0.9" stroke-linecap="round"/>
  <line x1="57" y1="24" x2="57" y2="72" stroke="#4fc3f7" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <line x1="64" y1="30" x2="64" y2="72" stroke="#4fc3f7" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <!-- Subtle glow dot at top -->
  <circle cx="50" cy="13" r="3" fill="#4fc3f7" opacity="0.5"/>
</svg>
